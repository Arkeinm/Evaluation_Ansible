---

- name: restart apache
  ansible.builtin.service:
    name: "{{ wp_apache_service }}"
    state: restarted
  when: not wp_deployment_is_container
  listen: "restart apache"

- name: restart apache container Debian
  ansible.builtin.shell: service apache2 restart
  args:
    executable: /bin/bash
  when:
    - wp_deployment_is_container
    - ansible_os_family == "Debian"
  listen: "restart apache"

- name: restart apache container RedHat
  ansible.builtin.shell: |
    pkill httpd || true
    sleep 1
    /usr/sbin/httpd -DFOREGROUND &
    sleep 2
  args:
    executable: /bin/bash
  when:
    - wp_deployment_is_container
    - ansible_os_family == "RedHat"
  listen: "restart apache"

- name: restart mariadb
  ansible.builtin.service:
    name: mariadb
    state: restarted
  when: not wp_deployment_is_container

- name: restart mariadb container
  ansible.builtin.shell: |
    pkill mysqld || true
    sleep 2
    mysqld_safe --datadir=/var/lib/mysql &
    sleep 5
  args:
    executable: /bin/bash
  when: wp_deployment_is_container
