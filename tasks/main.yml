---

- name: Charger les variables spécifiques à l'OS
  ansible.builtin.include_vars: "{{ ansible_os_family }}.yml"

- name: Installation des dépendances système
  ansible.builtin.include_tasks: install_packages.yml
  tags: [install, packages]

- name: Initialisation de la base de données
  ansible.builtin.include_tasks: configure_mariadb.yml
  tags: [install, database]

- name: Déploiement et configuration d'Apache
  ansible.builtin.include_tasks: configure_apache.yml
  tags: [configure, apache]

- name: Mise en place de WordPress
  ansible.builtin.include_tasks: deploy_wordpress.yml
  tags: [install, wordpress]

- name: Finalisation de la configuration WordPress
  ansible.builtin.include_tasks: configure_wordpress.yml
  tags: [configure, wordpress]
